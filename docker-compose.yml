services:
  app:
    build: .
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - APP_VERSION=1.0.0
      - BASE_URL=http://localhost:8000
      - SECRET_KEY=dev-secret-key
      - DATABASE_URL=postgresql+asyncpg://user:password@postgres:5432/urlshortener
      - REDIS_URL=redis://redis:6379/0
      - RATE_LIMIT_REQUESTS=100
      - RATE_LIMIT_WINDOW_SECONDS=60
      - CACHE_TTL_SECONDS=3600
      - NEGATIVE_CACHE_TTL_SECONDS=300
      - SHORT_CODE_LENGTH=6
      - SHORT_CODE_MAX_RETRIES=5
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./app:/app/app

  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: urlshortener
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U user -d urlshortener"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  loadtest:
    profiles: [loadtest]
    image: python:3.11-slim
    working_dir: /app
    volumes:
      - .:/app
    depends_on:
      - app
    entrypoint: ["sh", "scripts/run_locust.sh"]

volumes:
  postgres_data:
